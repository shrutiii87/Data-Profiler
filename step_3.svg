<svg width="1200" height="420" viewBox="0 0 1200 420" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#162447"/>
<stop offset="100%" stop-color="#233B88"/>
</linearGradient>

<filter id="shadow">
<feDropShadow dx="0" dy="10" stdDeviation="12"
flood-color="#4DA3FF"
flood-opacity="0.35"/>
</filter>

<style>

.title{
font:700 36px 'Segoe UI';
fill:white;
}

.card{
fill:#ffffff10;
stroke:#58A6FF;
stroke-width:2;
rx:18;
filter:url(#shadow);
}

.heading{
font:700 20px 'Segoe UI';
fill:white;
}

.sub{
font:15px 'Segoe UI';
fill:#C9E3FF;
}

.icon{
fill:#7CC4FF;
}

.arrow{
stroke:#58A6FF;
stroke-width:4;
stroke-linecap:round;
stroke-dasharray:10;
animation:flow 1.2s linear infinite;
}

@keyframes flow{
to{
stroke-dashoffset:-20;
}
}

</style>

</defs>

<rect width="1200" height="420" fill="url(#bg)"/>

<text x="600" y="55" class="title" text-anchor="middle">
Exploratory Data Analysis (EDA)
</text>

<!-- CARD 1 -->

<rect x="35" y="110" width="250" height="240" class="card"/>

<circle cx="160" cy="150" r="18" fill="#58A6FF"/>

<text x="160" y="157"
text-anchor="middle"
font-size="16"
fill="white">1</text>

<text x="160" y="190"
text-anchor="middle"
class="heading">

Univariate Analysis

</text>

<text x="65" y="230" class="sub">• Age Distribution</text>
<text x="65" y="258" class="sub">• Income Distribution</text>
<text x="65" y="286" class="sub">• Purchase Distribution</text>
<text x="65" y="322" class="sub">Histogram Analysis</text>

<!-- Arrow -->

<line x1="285" y1="230" x2="330" y2="230" class="arrow"/>

<polygon points="330,230 318,223 318,237"
fill="#58A6FF"/>

<!-- CARD 2 -->

<rect x="330" y="110" width="250" height="240" class="card"/>

<circle cx="455" cy="150" r="18" fill="#58A6FF"/>

<text x="455" y="157"
text-anchor="middle"
font-size="16"
fill="white">2</text>

<text x="455" y="190"
text-anchor="middle"
class="heading">

Bivariate Analysis

</text>

<text x="360" y="230" class="sub">• Gender vs Purchases</text>
<text x="360" y="258" class="sub">• Income vs Churn</text>
<text x="360" y="286" class="sub">Scatter Plot</text>
<text x="360" y="322" class="sub">Box Plot</text>

<!-- Arrow -->

<line x1="580" y1="230" x2="625" y2="230" class="arrow"/>

<polygon points="625,230 613,223 613,237"
fill="#58A6FF"/>

<!-- CARD 3 -->

<rect x="625" y="110" width="250" height="240" class="card"/>

<circle cx="750" cy="150" r="18" fill="#58A6FF"/>

<text x="750" y="157"
text-anchor="middle"
font-size="16"
fill="white">3</text>

<text x="750" y="190"
text-anchor="middle"
class="heading">

Multivariate Analysis

</text>

<text x="655" y="230" class="sub">• Correlation Heatmap</text>
<text x="655" y="258" class="sub">• Pair Plot</text>
<text x="655" y="286" class="sub">Feature Interaction</text>
<text x="655" y="322" class="sub">Correlation Matrix</text>

<!-- Arrow -->

<line x1="875" y1="230" x2="920" y2="230" class="arrow"/>

<polygon points="920,230 908,223 908,237"
fill="#58A6FF"/>

<!-- CARD 4 -->

<rect x="920" y="110" width="245" height="240" class="card"/>

<circle cx="1043" cy="150" r="18" fill="#22C55E"/>

<text x="1043" y="157"
text-anchor="middle"
font-size="16"
fill="white">✓</text>

<text x="1043" y="190"
text-anchor="middle"
class="heading">

EDA Insights

</text>

<text x="950" y="230" class="sub">• Patterns</text>
<text x="950" y="258" class="sub">• Relationships</text>
<text x="950" y="286" class="sub">• Correlations</text>
<text x="950" y="322" class="sub">• Better Decisions</text>

</svg>
