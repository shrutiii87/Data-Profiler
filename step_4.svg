<svg width="1200" height="400" viewBox="0 0 1200 400"
xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#162447"/>
<stop offset="100%" stop-color="#233B88"/>
</linearGradient>

<filter id="shadow">
<feDropShadow dx="0" dy="8" stdDeviation="10"
flood-color="#4DA3FF"
flood-opacity="0.35"/>
</filter>

<style>

.title{
font:700 36px 'Segoe UI';
fill:white;
}

.subtitle{
font:500 18px 'Segoe UI';
fill:#D6E8FF;
}

.card{
fill:#ffffff10;
stroke:#5DA8FF;
stroke-width:2;
rx:22;
filter:url(#shadow);
}

.heading{
font:700 22px 'Segoe UI';
fill:white;
}

.item{
font:16px 'Segoe UI';
fill:#DCEEFF;
}

.check{
fill:#22C55E;
font:700 16px 'Segoe UI';
}

.arrow{
stroke:#5DA8FF;
stroke-width:5;
stroke-linecap:round;
stroke-dasharray:10;
animation:flow 1.2s linear infinite;
}

@keyframes flow{
to{
stroke-dashoffset:-20;
}
}

</style>

</defs>

<rect width="1200" height="400" fill="url(#bg)"/>

<text x="600"
y="55"
text-anchor="middle"
class="title">

Data Profiling Report

</text>

<text x="600"
y="85"
text-anchor="middle"
class="subtitle">

Automatic Data Quality Summary using Pandas Profiling

</text>

<!-- Left Card -->

<rect x="60"
y="130"
width="440"
height="210"
class="card"/>

<circle cx="110" cy="175" r="20" fill="#5DA8FF"/>

<text x="110"
y="182"
text-anchor="middle"
font-size="16"
fill="white">

1

</text>

<text x="150"
y="182"
class="heading">

Generate Report

</text>

<text x="100" y="225" class="check">✓</text>
<text x="130" y="225" class="item">Pandas Profiling</text>

<text x="100" y="260" class="check">✓</text>
<text x="130" y="260" class="item">Automatic Analysis</text>

<text x="100" y="295" class="check">✓</text>
<text x="130" y="295" class="item">One Complete Report</text>

<!-- Arrow -->

<line x1="500"
y1="235"
x2="700"
y2="235"
class="arrow"/>

<polygon points="700,235 686,228 686,242"
fill="#5DA8FF"/>

<!-- Right Card -->

<rect x="700"
y="130"
width="440"
height="210"
class="card"/>

<circle cx="750" cy="175" r="20" fill="#22C55E"/>

<text x="750"
y="182"
text-anchor="middle"
font-size="16"
fill="white">

✓

</text>

<text x="790"
y="182"
class="heading">

Report Contains

</text>

<text x="740" y="225" class="check">✓</text>
<text x="770" y="225" class="item">Missing Values</text>

<text x="740" y="255" class="check">✓</text>
<text x="770" y="255" class="item">Descriptive Statistics</text>

<text x="740" y="285" class="check">✓</text>
<text x="770" y="285" class="item">Correlation Analysis</text>

<text x="740" y="315" class="check">✓</text>
<text x="770" y="315" class="item">Data Quality Warnings</text>

</svg>
