<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="450" viewBox="0 0 1600 450">

<defs>

<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#0D1B42"/>
<stop offset="100%" stop-color="#2749BA"/>
</linearGradient>

<linearGradient id="glass" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.18"/>
<stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.06"/>
</linearGradient>

<linearGradient id="accent" x1="0%" y1="0%" x2="0%" y2="100%">
<stop offset="0%" stop-color="#82D3FF"/>
<stop offset="100%" stop-color="#55A8FF"/>
</linearGradient>

<filter id="shadow">
<feDropShadow dx="0" dy="8" stdDeviation="18" flood-opacity=".30"/>
</filter>

</defs>

<!-- Background -->
<rect width="1600" height="450" rx="18" fill="url(#bg)"/>

<!-- Decorative Blur -->
<circle cx="150" cy="80" r="90" fill="#66B7FF" opacity=".08"/>
<circle cx="1450" cy="350" r="120" fill="#66B7FF" opacity=".08"/>
<circle cx="1250" cy="120" r="40" fill="#7FD0FF" opacity=".08"/>

<!-- Glass Card -->
<rect
x="120"
y="60"
width="1360"
height="330"
rx="28"
fill="url(#glass)"
stroke="#63B9FF"
stroke-width="2"
filter="url(#shadow)"/>

<!-- Left Accent -->
<rect
x="150"
y="90"
width="12"
height="270"
rx="6"
fill="url(#accent)"/>

<!-- Small Label -->
<text
x="200"
y="120"
fill="#89D3FF"
font-size="18"
font-family="Segoe UI"
letter-spacing="4">
PROJECT
</text>

<!-- Main Title -->
<text
x="200"
y="195"
fill="#FFFFFF"
font-size="72"
font-weight="700"
font-family="Segoe UI">
Data Profiler
</text>

<!-- Underline -->
<line
x1="200"
y1="215"
x2="730"
y2="215"
stroke="#69BEFF"
stroke-width="5"
stroke-linecap="round"/>

<!-- Subtitle -->
<text
x="200"
y="260"
fill="#DCE8FF"
font-size="32"
font-family="Segoe UI"
font-weight="600">
Data Preprocessing &amp; Feature Engineering
</text>

<!-- Bottom Features -->
<text
x="200"
y="315"
fill="#C8DFFF"
font-size="22"
font-family="Segoe UI">
Profiling • Cleaning • Missing Values • EDA • Feature Engineering
</text>

<!-- Right Stats Cards -->

<rect
x="980"
y="110"
width="360"
height="58"
rx="14"
fill="#3A5CCF"
fill-opacity=".35"
stroke="#74C5FF"/>

<text
x="1160"
y="147"
text-anchor="middle"
fill="#FFFFFF"
font-size="24"
font-family="Segoe UI">
📊 Data Profiling
</text>

<rect
x="980"
y="185"
width="360"
height="58"
rx="14"
fill="#3A5CCF"
fill-opacity=".35"
stroke="#74C5FF"/>

<text
x="1160"
y="222"
text-anchor="middle"
fill="#FFFFFF"
font-size="24"
font-family="Segoe UI">
🧹 Data Cleaning
</text>

<rect
x="980"
y="260"
width="360"
height="58"
rx="14"
fill="#3A5CCF"
fill-opacity=".35"
stroke="#74C5FF"/>

<text
x="1160"
y="297"
text-anchor="middle"
fill="#FFFFFF"
font-size="24"
font-family="Segoe UI">
📈 Exploratory Data Analysis
</text>

<!-- Decorative Dots -->

<circle cx="930" cy="135" r="4" fill="#8BD6FF"/>
<circle cx="930" cy="210" r="4" fill="#8BD6FF"/>
<circle cx="930" cy="285" r="4" fill="#8BD6FF"/>

</svg>
