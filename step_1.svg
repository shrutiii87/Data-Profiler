<svg width="900" height="260" viewBox="0 0 900 260"
xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#0F172A"/>
<stop offset="100%" stop-color="#1E3A8A"/>
</linearGradient>

<filter id="glow">
<feDropShadow dx="0" dy="0" stdDeviation="8"
flood-color="#60A5FA"/>
</filter>

</defs>

<style>

text{
font-family:Segoe UI,Arial;
}

.card{
fill:#ffffff18;
stroke:#60A5FA;
stroke-width:2;
rx:18;
filter:url(#glow);
animation:float 3s ease-in-out infinite;
}

.title{
fill:white;
font-size:28px;
font-weight:700;
}

.label{
fill:white;
font-size:18px;
font-weight:600;
}

.sub{
fill:#BFDBFE;
font-size:13px;
}

.arrow{
stroke:#60A5FA;
stroke-width:4;
stroke-linecap:round;
stroke-dasharray:8;
animation:move 1s linear infinite;
}

@keyframes move{
to{
stroke-dashoffset:-16;
}
}

@keyframes float{
50%{
transform:translateY(-5px);
}
}

</style>

<rect width="900" height="260" fill="url(#bg)"/>

<text x="450" y="40"
text-anchor="middle"
class="title">

Data Preprocessing Workflow

</text>

<!-- Card 1 -->

<rect class="card" x="30" y="90" width="140" height="110"/>

<text x="100" y="130"
font-size="34"
text-anchor="middle">📄</text>

<text x="100" y="165"
text-anchor="middle"
class="label">CSV</text>

<text x="100" y="185"
text-anchor="middle"
class="sub">Data Source</text>

<!-- Card2 -->

<rect class="card" x="210" y="90" width="140" height="110"/>

<text x="280" y="130"
font-size="34"
text-anchor="middle">🧹</text>

<text x="280" y="165"
text-anchor="middle"
class="label">Cleaning</text>

<text x="280" y="185"
text-anchor="middle"
class="sub">Missing Values</text>

<!-- Card3 -->

<rect class="card" x="390" y="90" width="140" height="110"/>

<text x="460" y="130"
font-size="34"
text-anchor="middle">⚙️</text>

<text x="460" y="165"
text-anchor="middle"
class="label">Features</text>

<text x="460" y="185"
text-anchor="middle"
class="sub">Engineering</text>

<!-- Card4 -->

<rect class="card" x="570" y="90" width="140" height="110"/>

<text x="640" y="130"
font-size="34"
text-anchor="middle">📊</text>

<text x="640" y="165"
text-anchor="middle"
class="label">EDA</text>

<text x="640" y="185"
text-anchor="middle"
class="sub">Visualization</text>

<!-- Card5 -->

<rect class="card" x="750" y="90" width="120" height="110"/>

<text x="810" y="130"
font-size="34"
text-anchor="middle">📈</text>

<text x="810" y="165"
text-anchor="middle"
class="label">Report</text>

<text x="810" y="185"
text-anchor="middle"
class="sub">Profiling</text>

<!-- Arrows -->

<line class="arrow" x1="170" y1="145" x2="210" y2="145"/>
<line class="arrow" x1="350" y1="145" x2="390" y2="145"/>
<line class="arrow" x1="530" y1="145" x2="570" y2="145"/>
<line class="arrow" x1="710" y1="145" x2="750" y2="145"/>

</svg>
