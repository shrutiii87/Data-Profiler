<svg width="1100" height="420" viewBox="0 0 1100 420"
xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#0F172A"/>
<stop offset="100%" stop-color="#1E3A8A"/>
</linearGradient>

<filter id="shadow">
<feDropShadow dx="0" dy="8" stdDeviation="12"
flood-color="#3B82F6"
flood-opacity=".35"/>
</filter>

</defs>

<style>

.title{
font:700 34px 'Segoe UI';
fill:white;
}

.card{
fill:#ffffff10;
stroke:#60A5FA;
stroke-width:2;
rx:18;
filter:url(#shadow);
}

.heading{
font:700 22px 'Segoe UI';
fill:white;
}

.item{
font:16px 'Segoe UI';
fill:#dbeafe;
}

.tick{
fill:#22C55E;
font:700 16px 'Segoe UI';
}

.arrow{
stroke:#60A5FA;
stroke-width:4;
stroke-linecap:round;
stroke-dasharray:10;
animation:flow 1.2s linear infinite;
}

@keyframes flow{
to{
stroke-dashoffset:-20;
}
}

</style>

<rect width="1100" height="420" fill="url(#bg)"/>

<text x="550"
y="55"
text-anchor="middle"
class="title">

Data Understanding &amp; Cleaning

</text>

<!-- LEFT CARD -->

<rect x="70"
y="105"
width="410"
height="250"
class="card"/>

<text x="100"
y="145"
class="heading">

Initial Exploration

</text>

<text x="105" y="185" class="tick">✓</text>
<text x="135" y="185" class="item">Explore using head()</text>

<text x="105" y="220" class="tick">✓</text>
<text x="135" y="220" class="item">Check structure with info()</text>

<text x="105" y="255" class="tick">✓</text>
<text x="135" y="255" class="item">Generate summary using describe()</text>

<text x="105" y="290" class="tick">✓</text>
<text x="135" y="290" class="item">Identify missing values</text>

<text x="105" y="325" class="tick">✓</text>
<text x="135" y="325" class="item">Detect duplicate records</text>

<!-- RIGHT CARD -->

<rect x="620"
y="105"
width="410"
height="250"
class="card"/>

<text x="650"
y="145"
class="heading">

Data Cleaning

</text>

<text x="655" y="185" class="tick">✓</text>
<text x="685" y="185" class="item">Handle missing values</text>

<text x="655" y="220" class="tick">✓</text>
<text x="685" y="220" class="item">Correct inconsistent data types</text>

<text x="655" y="255" class="tick">✓</text>
<text x="685" y="255" class="item">Remove duplicate records</text>

<text x="655" y="290" class="tick">✓</text>
<text x="685" y="290" class="item">Drop irrelevant columns</text>

<text x="655" y="325" class="tick">✓</text>
<text x="685" y="325" class="item">Prepare clean dataset</text>

<!-- CENTER CONNECTOR -->

<line x1="480"
y1="230"
x2="620"
y2="230"
class="arrow"/>

<polygon points="620,230 606,222 606,238"
fill="#60A5FA"/>

</svg>
