<svg xmlns="http://www.w3.org/2000/svg"
     width="1920"
     height="1080"
     viewBox="0 0 1920 1080">

<style>
    svg{
        font-family:Segoe UI,Arial,sans-serif;
    }

    .title{
        font-size:52px;
        font-weight:700;
        fill:#ffffff;
        opacity:0;
        animation:titleAnim 10s infinite;
    }

    .subtitle{
        font-size:22px;
        fill:#a9c3e6;
        opacity:0;
        animation:titleAnim 10s infinite;
    }

    .text{
        font-size:28px;
        fill:#243447;
        font-weight:500;
    }

    .sender{
        font-size:18px;
        fill:white;
        font-weight:bold;
    }

    .shadow{
        filter:url(#shadow);
    }

    .bubble{
        opacity:0;
        transform-box:fill-box;
        transform-origin:center;
    }

    /* ---------- Title fades in fast, stays, fades out with bubbles ---------- */
    @keyframes titleAnim{
        0%   {opacity:0; transform:translateY(-15px);}
        4%   {opacity:1; transform:translateY(0);}
        80%  {opacity:1; transform:translateY(0);}
        88%  {opacity:0; transform:translateY(0);}
        100% {opacity:0; transform:translateY(0);}
    }

    /* ---------- Bubble 1 : left, enters ~0.5s, holds, fades w/ group ---------- */
    .b1{ animation: b1Anim 10s infinite; }
    @keyframes b1Anim{
        0%   {opacity:0; transform:translateX(-120px) scale(.6);}
        5%   {opacity:0; transform:translateX(-120px) scale(.6);}
        9%   {opacity:1; transform:translateX(0) scale(1.05);}
        11%  {opacity:1; transform:translateX(0) scale(1);}
        80%  {opacity:1; transform:translateX(0) scale(1);}
        88%  {opacity:0; transform:translateX(0) scale(1);}
        100% {opacity:0; transform:translateX(0) scale(1);}
    }

    /* ---------- Bubble 2 : right, enters ~1.5s ---------- */
    .b2{ animation: b2Anim 10s infinite; }
    @keyframes b2Anim{
        0%   {opacity:0; transform:translateX(120px) scale(.6);}
        15%  {opacity:0; transform:translateX(120px) scale(.6);}
        19%  {opacity:1; transform:translateX(0) scale(1.05);}
        21%  {opacity:1; transform:translateX(0) scale(1);}
        80%  {opacity:1; transform:translateX(0) scale(1);}
        88%  {opacity:0; transform:translateX(0) scale(1);}
        100% {opacity:0; transform:translateX(0) scale(1);}
    }

    /* ---------- Bubble 3 : left, enters ~2.5s ---------- */
    .b3{ animation: b3Anim 10s infinite; }
    @keyframes b3Anim{
        0%   {opacity:0; transform:translateX(-120px) scale(.6);}
        25%  {opacity:0; transform:translateX(-120px) scale(.6);}
        29%  {opacity:1; transform:translateX(0) scale(1.05);}
        31%  {opacity:1; transform:translateX(0) scale(1);}
        80%  {opacity:1; transform:translateX(0) scale(1);}
        88%  {opacity:0; transform:translateX(0) scale(1);}
        100% {opacity:0; transform:translateX(0) scale(1);}
    }

    /* ---------- Bubble 4 : right, enters ~3.5s ---------- */
    .b4{ animation: b4Anim 10s infinite; }
    @keyframes b4Anim{
        0%   {opacity:0; transform:translateX(120px) scale(.6);}
        35%  {opacity:0; transform:translateX(120px) scale(.6);}
        39%  {opacity:1; transform:translateX(0) scale(1.05);}
        41%  {opacity:1; transform:translateX(0) scale(1);}
        80%  {opacity:1; transform:translateX(0) scale(1);}
        88%  {opacity:0; transform:translateX(0) scale(1);}
        100% {opacity:0; transform:translateX(0) scale(1);}
    }

</style>

<defs>

<!-- Dark navy horizontal gradient like the reference banner -->
<linearGradient id="bg" x1="0" y1="0" x2="1" y2="0">
    <stop offset="0%"  stop-color="#050b1a"/>
    <stop offset="45%" stop-color="#122a52"/>
    <stop offset="100%" stop-color="#0a1830"/>
</linearGradient>

<!-- Soft glow that sits along the bottom, like the reference image -->
<radialGradient id="glow" cx="50%" cy="100%" r="75%">
    <stop offset="0%"  stop-color="#2f6fd6" stop-opacity=".55"/>
    <stop offset="45%" stop-color="#1c4d9e" stop-opacity=".25"/>
    <stop offset="100%" stop-color="#0a1830" stop-opacity="0"/>
</radialGradient>

<filter id="shadow">
    <feDropShadow dx="0" dy="8" stdDeviation="10" flood-opacity=".35"/>
</filter>

</defs>

<rect width="100%" height="100%" fill="url(#bg)"/>
<rect width="100%" height="100%" fill="url(#glow)"/>

<!-- Title -->

<text x="960" y="90" text-anchor="middle" class="title">
Data Preprocessing &amp; Feature Engineering
</text>

<text x="960" y="130" text-anchor="middle" class="subtitle">
Presentation Dialogue
</text>

<!-- ===================================================== -->
<!-- Dialogue 1 -->
<!-- ===================================================== -->

<g class="bubble b1 shadow">
<rect x="120" y="220" width="760" height="150" rx="35" fill="#4F9DFF"/>
<text x="165" y="265" class="sender">Speaker 1</text>
<text x="165" y="325" class="text" fill="white">Hi everyone! What's our project about?</text>
</g>

<!-- ===================================================== -->
<!-- Dialogue 2 -->
<!-- ===================================================== -->

<g class="bubble b2 shadow">
<rect x="980" y="410" width="820" height="210" rx="35" fill="#ffffff"/>
<text x="1030" y="455" font-size="18" font-weight="bold" fill="#4F9DFF">Speaker 2</text>
<text x="1030" y="510" class="text">It's about Data Preprocessing and</text>
<text x="1030" y="555" class="text">Feature Engineering using</text>
<text x="1030" y="600" class="text">real-world customer data.</text>
</g>

<!-- ===================================================== -->
<!-- Dialogue 3 -->
<!-- ===================================================== -->

<g class="bubble b3 shadow">
<rect x="120" y="670" width="620" height="140" rx="35" fill="#4F9DFF"/>
<text x="165" y="715" class="sender">Speaker 3</text>
<text x="165" y="775" class="text" fill="white">What was our goal?</text>
</g>

<!-- ===================================================== -->
<!-- Dialogue 4 -->
<!-- ===================================================== -->

<g class="bubble b4 shadow">
<rect x="760" y="820" width="1040" height="210" rx="35" fill="#ffffff"/>
<text x="810" y="865" font-size="18" font-weight="bold" fill="#4F9DFF">Speaker 4</text>
<text x="810" y="915" class="text">To clean, analyze, and transform data from</text>
<text x="810" y="955" class="text">CSV, JSON, SQL, and APIs, then prepare it</text>
<text x="810" y="995" class="text">for a Machine Learning model to predict customer churn.</text>
</g>

</svg>
