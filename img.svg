<svg width="1400" height="400"
viewBox="0 0 1400 400"
xmlns="http://www.w3.org/2000/svg">

<defs>

<!-- Background -->
<linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#020617"/>
<stop offset="50%" stop-color="#172554"/>
<stop offset="100%" stop-color="#0F172A"/>
</linearGradient>


<!-- Glass Card -->
<linearGradient id="glass" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#ffffff22"/>
<stop offset="100%" stop-color="#ffffff08"/>
</linearGradient>


<!-- Text Gradient -->
<linearGradient id="title" x1="0" x2="1">
<stop offset="0%" stop-color="#22D3EE"/>
<stop offset="100%" stop-color="#A78BFA"/>
</linearGradient>


<!-- Glow -->
<filter id="blur">
<feGaussianBlur stdDeviation="12"/>
</filter>


</defs>


<!-- Background -->

<rect width="1400"
height="400"
rx="35"
fill="url(#background)"/>



<!-- Decorative Glow -->

<circle cx="1200"
cy="80"
r="90"
fill="#2563EB"
opacity="0.25"
filter="url(#blur)"/>

<circle cx="180"
cy="320"
r="100"
fill="#7C3AED"
opacity="0.25"
filter="url(#blur)"/>



<!-- LEFT DATA PANEL -->

<rect x="80"
y="90"
width="300"
height="220"
rx="25"
fill="url(#glass)"
stroke="#38BDF8"
stroke-opacity="0.3"/>


<text x="230"
y="135"
fill="#94A3B8"
font-size="18"
font-family="Arial"
text-anchor="middle">
RAW DATA
</text>


<!-- Data rows -->

<g font-family="monospace"
font-size="16"
fill="#E2E8F0">

<text x="130" y="180">
Customer_ID
</text>

<text x="130" y="215">
Age
</text>

<text x="130" y="250">
Income
</text>

<text x="130" y="285">
Feature_01
</text>

</g>


<!-- Animated Scan -->

<rect x="110"
y="160"
width="240"
height="3"
fill="#22C55E">

<animate attributeName="y"
values="160;290;160"
dur="3s"
repeatCount="indefinite"/>

</rect>



<!-- CENTER -->

<text x="700"
y="140"
font-size="62"
font-weight="bold"
font-family="Arial"
fill="url(#title)"
text-anchor="middle">

DATA PROFILER

</text>


<text x="700"
y="205"
font-size="30"
font-family="Arial"
fill="white"
text-anchor="middle">

Data Preprocessing &amp;

</text>


<text x="700"
y="245"
font-size="30"
font-family="Arial"
fill="white"
text-anchor="middle">

Feature Engineering

</text>


<text x="700"
y="290"
font-size="17"
font-family="Arial"
fill="#CBD5E1"
text-anchor="middle">

Clean • Transform • Engineer • Analyze

</text>




<!-- RIGHT FEATURE ENGINEERING CARD -->

<rect x="1020"
y="90"
width="300"
height="220"
rx="25"
fill="url(#glass)"
stroke="#A78BFA"
stroke-opacity="0.4"/>



<text x="1170"
y="135"
fill="#94A3B8"
font-size="18"
font-family="Arial"
text-anchor="middle">

FEATURES

</text>



<!-- Feature Nodes -->

<g fill="#38BDF8">


<circle cx="1100"
cy="190"
r="15"/>

<circle cx="1170"
cy="240"
r="15"/>

<circle cx="1240"
cy="190"
r="15"/>


</g>


<g stroke="#64748B"
stroke-width="2">

<line x1="1100"
y1="190"
x2="1170"
y2="240"/>

<line x1="1170"
y1="240"
x2="1240"
y2="190"/>

</g>


<text x="1170"
y="290"
fill="#E2E8F0"
font-size="16"
font-family="Arial"
text-anchor="middle">

Engineered Data

</text>




<!-- Floating Particles -->

<g fill="#22D3EE">

<circle cx="500" cy="80" r="5">
<animate attributeName="cy"
values="80;50;80"
dur="3s"
repeatCount="indefinite"/>
</circle>


<circle cx="900" cy="330" r="5">
<animate attributeName="cy"
values="330;360;330"
dur="3s"
repeatCount="indefinite"/>
</circle>


</g>


</svg>
