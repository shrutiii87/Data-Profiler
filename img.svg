repeatCount="indefinite"/>

</circle>



<text x="700"
y="240"
fill="white"
font-size="24"
font-weight="bold"
text-anchor="middle">

DATA

</text>


<text x="700"
y="275"
fill="white"
font-size="24"
font-weight="bold"
text-anchor="middle">

ENGINE

</text>





