<g font-family="Arial"
text-anchor="middle">


<rect x="100" y="130"
width="220"
height="70"
rx="18"
fill="#2563EB"/>

<text x="210"
y="173"
fill="white"
font-size="22">

📄 CSV

</text>



<rect x="100" y="215"
width="220"
height="70"
rx="18"
fill="#059669"/>

<text x="210"
y="258"
fill="white"
font-size="22">

🗂 JSON

</text>



<rect x="100" y="300"
width="220"
height="70"
rx="18"
fill="#7C3AED"/>

<text x="210"
y="343"
