🗄 SQLite

</text>


<rect x="100" y="385"
width="220"
height="70"
rx="18"
fill="#EA580C"/>

<text x="210"
y="428"
fill="white"
font-size="22">

🌐 API

</text>


</g>




<!-- CENTER CORE -->


<circle cx="700"
cy="250"
r="105"
fill="#06B6D4"
opacity=".15"
filter="url(#glow)"/>


<circle cx="700"
cy="250"
r="85"
