<svg width="1500" height="500"
viewBox="0 0 1500 500"
xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#020617"/>
<stop offset="100%" stop-color="#172554"/>
</linearGradient>

<linearGradient id="title" x1="0" x2="1">
<stop offset="0%" stop-color="#22D3EE"/>
<stop offset="100%" stop-color="#C084FC"/>
</linearGradient>

<linearGradient id="card">
<stop offset="0%" stop-color="#ffffff22"/>
<stop offset="100%" stop-color="#ffffff08"/>
</linearGradient>

<filter id="glow">
<feGaussianBlur stdDeviation="8"/>
</filter>

</defs>


<!-- Background -->

<rect width="1500"
height="500"
rx="35"
fill="url(#bg)"/>


<!-- Decorative glow -->

<circle cx="150"
cy="100"
r="90"
fill="#2563EB"
opacity="0.25"
filter="url(#glow)"/>

<circle cx="1350"
cy="350"
r="100"
fill="#7C3AED"
opacity="0.25"
filter="url(#glow)"/>



<!-- TITLE -->

<text x="750"
y="70"
text-anchor="middle"
font-family="Arial"
font-weight="700"
font-size="58"
fill="url(#title)">
DATA PROFILER
</text>


<text x="750"
y="115"
text-anchor="middle"
font-family="Arial"
font-size="27"
fill="#E2E8F0">
Data Preprocessing &amp; Feature Engineering
</text>





<!-- ================= LEFT CARD ================= -->

<rect x="80"
y="175"
width="330"
height="230"
rx="25"
fill="url(#card)"
stroke="#38BDF8"
stroke-width="2"/>


<text x="245"
y="220"
text-anchor="middle"
font-family="Arial"
font-size="21"
fill="#38BDF8">

DATA INGESTION

</text>


<g font-family="Arial"
font-size="17"
fill="#FFFFFF">

<text x="120" y="265">
📄 CSV Loading
</text>

<text x="120" y="305">
📋 JSON Loading
</text>

<text x="120" y="345">
🗄 SQLite Database
</text>

<text x="120" y="385">
🌐 API Connection
</text>

</g>







<!-- ================= CENTER CARD ================= -->

<rect x="475"
y="175"
width="550"
height="230"
rx="25"
fill="url(#card)"
stroke="#C084FC"
stroke-width="2"/>


<text x="750"
y="220"
text-anchor="middle"
font-family="Arial"
font-size="21"
fill="#C084FC">

DATA PROCESSING ENGINE

</text>


<!-- Main connection -->

<line x1="570"
y1="315"
x2="930"
y2="315"
stroke="#64748B"
stroke-width="4"/>



<!-- Nodes -->

<g font-family="Arial"
font-size="14"
text-anchor="middle"
fill="white">


<circle cx="570"
cy="315"
r="40"
fill="#2563EB"/>

<text x="570"
y="320">
Clean
</text>



<circle cx="690"
cy="315"
r="40"
fill="#10B981"/>

<text x="690"
y="320">
Profile
</text>



<circle cx="810"
cy="315"
r="40"
fill="#F59E0B"/>

<text x="810"
y="320">
EDA
</text>



<circle cx="930"
cy="315"
r="40"
fill="#EC4899"/>

<text x="930"
y="320">
Features
</text>


</g>



<!-- Animated Data Flow -->

<circle r="7"
fill="#22C55E">

<animateMotion
dur="4s"
repeatCount="indefinite"
path="M570 315 L690 315 L810 315 L930 315"/>

</circle>







<!-- ================= RIGHT CARD ================= -->


<rect x="1090"
y="175"
width="330"
height="230"
rx="25"
fill="url(#card)"
stroke="#22C55E"
stroke-width="2"/>


<text x="1255"
y="220"
text-anchor="middle"
font-family="Arial"
font-size="21"
fill="#22C55E">

ANALYTICS

</text>



<g font-family="Arial"
font-size="17"
fill="#FFFFFF">


<text x="1135"
y="265">

📊 Univariate Analysis

</text>


<text x="1135"
y="305">

🔗 Bivariate Analysis

</text>


<text x="1135"
y="345">

🧬 Multivariate Analysis

</text>


<text x="1135"
y="385">

💡 Insights Generation

</text>


</g>







<!-- FOOTER -->

<rect x="250"
y="435"
width="1000"
height="35"
rx="18"
fill="#020617"
stroke="#334155"/>


<text x="750"
y="458"
text-anchor="middle"
font-family="Arial"
font-size="15"
fill="#CBD5E1">

Missing Values • Duplicate Removal • Drop Columns • Feature Engineering • Data Quality

