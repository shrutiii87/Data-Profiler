<svg width="1400" height="520"
viewBox="0 0 1400 520"
xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
<stop offset="0%" stop-color="#020617"/>
<stop offset="50%" stop-color="#111827"/>
<stop offset="100%" stop-color="#1E1B4B"/>
</linearGradient>


<linearGradient id="core">
<stop offset="0%" stop-color="#06B6D4"/>
<stop offset="100%" stop-color="#8B5CF6"/>
</linearGradient>


<filter id="glow">
<feGaussianBlur stdDeviation="8"/>
</filter>

</defs>



<!-- Background -->

<rect width="1400"
height="520"
rx="35"
fill="url(#bg)"/>



<!-- Title -->

<text x="700"
y="55"
font-size="55"
font-family="Arial"
font-weight="bold"
fill="url(#core)"
text-anchor="middle">

DATA PROFILER

</text>


<text x="700"
y="95"
font-size="22"
font-family="Arial"
fill="#CBD5E1"
text-anchor="middle">

Data Preprocessing • Feature Engineering • Exploratory Analysis

</text>




<!-- CONNECTION LINES -->

<g stroke="#334155"
stroke-width="2">


<!-- Inputs -->

<line x1="220" y1="170" x2="600" y2="250"/>
<line x1="220" y1="250" x2="600" y2="250"/>
<line x1="220" y1="330" x2="600" y2="250"/>


<!-- Outputs -->

<line x1="800" y1="250" x2="1180" y2="170"/>
<line x1="800" y1="250" x2="1180" y2="250"/>
<line x1="800" y1="250" x2="1180" y2="330"/>


</g>




<!-- Animated Data Flow -->

<circle r="8" fill="#22C55E">

<animateMotion
dur="5s"
repeatCount="indefinite"
path="M220 170 L600 250 L800 250 L1180 170"/>

</circle>



<circle r="8" fill="#FACC15">

<animateMotion
dur="6s"
repeatCount="indefinite"
path="M220 250 L600 250 L800 250 L1180 250"/>

</circle>




