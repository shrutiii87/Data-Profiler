<svg width="1200" height="420"
viewBox="0 0 1200 420"
xmlns="http://www.w3.org/2000/svg">

<style>

svg{
background:#0d1117;
font-family:Segoe UI,Arial,sans-serif;
}

.title{
fill:white;
font-size:28px;
font-weight:700;
}

.subtitle{
fill:#8b949e;
font-size:15px;
}

.stage{
fill:#161b22;
stroke:#30363d;
stroke-width:2;
rx:18;
}

.stageTitle{
fill:#ffffff;
font-size:18px;
font-weight:600;
text-anchor:middle;
}

.stageSub{
fill:#8b949e;
font-size:13px;
text-anchor:middle;
}

.pipe{
stroke:#30363d;
stroke-width:8;
stroke-linecap:round;
}

.packet{
fill:#58a6ff;
filter:url(#glow);
animation:flow 8s linear infinite;
}

.packet2{
fill:#3fb950;
animation:flow 8s linear infinite;
animation-delay:2s;
}

.packet3{
fill:#d29922;
animation:flow 8s linear infinite;
animation-delay:4s;
}

.gear{
transform-origin:center;
transform-box:fill-box;
animation:spin 5s linear infinite;
}

.status{
animation:pulse 1.2s infinite;
}

.arrow{
fill:#58a6ff;
opacity:.8;
}

@keyframes spin{

from{
transform:rotate(0deg);
}

to{
transform:rotate(360deg);
}

}

@keyframes pulse{

50%{
opacity:.35;
}

}

@keyframes flow{

0%{
transform:translateX(0px);
}

100%{
transform:translateX(820px);
}

}

</style>

<defs>

<filter id="glow">
<feGaussianBlur stdDeviation="4"/>
</filter>

</defs>

<text x="60" y="55" class="title">

ETL Data Pipeline

</text>

<text x="60" y="82" class="subtitle">

Extract → Transform → Load → Analytics

</text>

<!-- PIPE -->

<line x1="150" y1="230" x2="1040" y2="230" class="pipe"/>

<!-- STAGE 1 -->

<rect x="40" y="130"
width="170"
height="160"
class="stage"/>

<text x="125" y="175" font-size="44" text-anchor="middle">📂</text>

<text x="125" y="215" class="stageTitle">

Extract

</text>

<text x="125" y="240" class="stageSub">

CSV • Excel • API

</text>

<circle cx="185" cy="150" r="6"
fill="#3fb950"
class="status"/>

<!-- STAGE 2 -->

<rect x="290" y="130"
width="190"
height="160"
class="stage"/>

<text x="385" y="172"
font-size="42"
class="gear">⚙️</text>

<text x="385" y="215"
class="stageTitle">

Transform

</text>

<text x="385" y="240"
class="stageSub">

Clean • Merge • Encode

</text>

<circle cx="455" cy="150"
r="6"
fill="#3fb950"
class="status"/>

<!-- STAGE 3 -->

<rect x="560" y="130"
width="190"
height="160"
class="stage"/>

<text x="655"
y="175"
font-size="42"
text-anchor="middle">🗄️</text>

<text x="655"
y="215"
class="stageTitle">

Warehouse

</text>

<text x="655"
y="240"
class="stageSub">

SQL • PostgreSQL

</text>

<circle cx="725"
cy="150"
r="6"
fill="#3fb950"
class="status"/>

<!-- STAGE 4 -->

<rect x="840"
y="130"
width="250"
height="160"
class="stage"/>

<text x="965"
y="175"
font-size="42"
text-anchor="middle">📊</text>

<text x="965"
y="215"
class="stageTitle">

Analytics

</text>

<text x="965"
y="240"
class="stageSub">

Power BI • Python

</text>

<circle cx="1065"
cy="150"
r="6"
fill="#3fb950"
class="status"/>

<!-- DATA PACKETS -->

<circle
cx="170"
cy="230"
r="7"
class="packet"/>

<circle
cx="170"
cy="230"
r="7"
class="packet2"/>

<circle
cx="170"
cy="230"
r="7"
class="packet3"/>

<!-- FLOW ARROWS -->

<polygon points="250,222 270,230 250,238"
class="arrow"/>

<polygon points="520,222 540,230 520,238"
class="arrow"/>

<polygon points="800,222 820,230 800,238"
class="arrow"/>

</svg>

